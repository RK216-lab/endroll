<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memorial End Roll Pro</title>
  <style>
    :root {
      --bg-color: #080808;
      --panel-bg: #121212;
      --accent: #b89a5b; /* 落ち着いた金 */
      --text-main: #e0e0e0;
      --text-sub: #a0a0a0;
      --border: #2a2a2a;
      --font: "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font);
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* 入力エリアの明示 */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .upload-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 25px;
      text-align: center;
      border-radius: 4px;
      transition: border-color 0.3s;
    }

    .upload-card:hover {
      border-color: var(--accent);
    }

    .upload-card h3 {
      margin-top: 0;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .upload-card p {
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    input[type="file"] {
      margin-top: 15px;
      font-size: 0.9rem;
      color: var(--text-sub);
    }

    /* エディタエリア */
    .editor-section {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 30px;
      margin-bottom: 30px;
    }

    .photo-preview-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    #current-photo {
      width: 560px;
      height: 315px;
      object-fit: contain;
      background: #000;
      border: 1px solid var(--border);
    }

    .controls-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      margin-bottom: 15px;
      font-family: var(--font);
    }

    button {
      background: var(--panel-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 10px 25px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--border);
    }

    #generate-btn {
      width: 100%;
      padding: 20px;
      background: var(--accent);
      color: #000;
      font-weight: bold;
      font-size: 1.2rem;
      border: none;
      margin-top: 20px;
      letter-spacing: 0.1em;
    }

    #generate-btn:disabled {
      background: #444;
      color: #777;
    }

    video {
      width: 100%;
      margin-top: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .download-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>追悼エンドロール</h1>
    <p>故人との思い出</p>
  </header>

  <div class="upload-grid">
    <div class="upload-card">
      <h3>1. 思い出の写真を選択</h3>
      <p>※複数枚まとめて選択できます</p>
      <input type="file" id="input-images" multiple accept="image/*">
    </div>
    <div class="upload-card">
      <h3>2. 背景音楽(BGM)を選択</h3>
      <p>MP3 / WAV / M4A / 動画ファイルも可</p>
      <input type="file" id="input-audio" accept=".mp3,.m4a,.wav,.aac,.mp4,.mov,.m4v">
    </div>
  </div>

  <div class="editor-section">
    <div class="photo-preview-wrap">
      <div class="controls-row">
        <button id="btn-prev">前へ</button>
        <button id="btn-next">次へ</button>
      </div>
      <img id="current-photo" alt="">
    </div>

    <label>表示期間・場所</label>
    <input type="text" id="field-period" placeholder="例：昭和四十二年 八月 鎌倉にて">
    <label>お名前・出来事</label>
    <input type="text" id="field-caption" placeholder="例：親族一同での海水浴">

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">

    <label>開始タイトル</label>
    <input type="text" id="title-start" placeholder="例：田中太郎 儀 追悼のあゆみ">
    <label>終了タイトル</label>
    <input type="text" id="title-end" placeholder="例：安らかに。">
  </div>

  <button id="generate-btn">高品質動画を作成する</button>

  <canvas id="render-canvas" width="1920" height="1080" style="display:none;"></canvas>
  <video id="preview-video" controls></video>
  <div id="dl-area"></div>
</div>

<script type="module">
import {
  Output, BufferTarget, Mp4OutputFormat, CanvasSource, AudioBufferSource,
  QUALITY_HIGH, getFirstEncodableVideoCodec, getFirstEncodableAudioCodec
} from "https://esm.sh/mediabunny@latest";

const ui = {
  images: document.getElementById('input-images'),
  audio: document.getElementById('input-audio'),
  photo: document.getElementById('current-photo'),
  period: document.getElementById('field-period'),
  caption: document.getElementById('field-caption'),
  btnPrev: document.getElementById('btn-prev'),
  btnNext: document.getElementById('btn-next'),
  btnGen: document.getElementById('generate-btn'),
  canvas: document.getElementById('render-canvas'),
  video: document.getElementById('preview-video'),
  tStart: document.getElementById('title-start'),
  tEnd: document.getElementById('title-end'),
  dlArea: document.getElementById('dl-area')
};

const ctx = ui.canvas.getContext('2d');
let photoList = [];
let currentIndex = 0;
let audioBuffer = null;

// 著作権ロゴの読み込み
const logo = new Image();
logo.src = "logo.png";

// 写真読み込み
ui.images.onchange = async (e) => {
  const files = Array.from(e.target.files);
  photoList = await Promise.all(files.map(file => new Promise(res => {
    const r = new FileReader();
    r.onload = (ev) => {
      const img = new Image();
      img.onload = () => res({ img, period: "", caption: "" });
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  })));
  currentIndex = 0;
  updateUI();
};

// 音声/動画読み込み（MP3, WAV, M4A, MP4対応）
ui.audio.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  ui.btnGen.disabled = true;
  ui.btnGen.textContent = "音声を解析中...";
  try {
    const audioCtx = new AudioContext();
    const arrayBuffer = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    ui.btnGen.textContent = "高品質動画を作成する";
  } catch (err) {
    alert("この音声ファイルは読み込めませんでした。形式を確認してください。");
  } finally {
    ui.btnGen.disabled = false;
  }
};

function updateUI() {
  if (!photoList[currentIndex]) return;
  const item = photoList[currentIndex];
  ui.photo.src = item.img.src;
  ui.period.value = item.period;
  ui.caption.value = item.caption;
}

function saveCurrent() {
  if (!photoList[currentIndex]) return;
  photoList[currentIndex].period = ui.period.value;
  photoList[currentIndex].caption = ui.caption.value;
}

ui.btnPrev.onclick = () => { saveCurrent(); currentIndex = (currentIndex - 1 + photoList.length) % photoList.length; updateUI(); };
ui.btnNext.onclick = () => { saveCurrent(); currentIndex = (currentIndex + 1) % photoList.length; updateUI(); };

async function getCodecConfig(hasAudio) {
  const format = new Mp4OutputFormat();
  const vCodec = await getFirstEncodableVideoCodec(format.getSupportedVideoCodecs(), { width: 1920, height: 1080 });
  const aCodec = hasAudio ? await getFirstEncodableAudioCodec(format.getSupportedAudioCodecs()) : null;
  return { format, vCodec, aCodec };
}

ui.btnGen.onclick = async () => {
  if (photoList.length === 0) return alert("写真を選んでください");
  saveCurrent();

  const fps = 30;
  const secTitle = 6;
  const secPhoto = 8;
  const totalSec = (secTitle * 2) + (secPhoto * photoList.length);

  ui.btnGen.disabled = true;
  ui.btnGen.textContent = "動画を生成しています（1080p）...";

  try {
    const config = await getCodecConfig(!!audioBuffer);
    const output = new Output({ format: config.format, target: new BufferTarget() });
    
    const vSource = new CanvasSource(ui.canvas, { 
      codec: config.vCodec, 
      bitrate: 8000000 // 8Mbpsの高画質設定
    });
    output.addVideoTrack(vSource, { frameRate: fps });

    let aPromise = Promise.resolve();
    if (audioBuffer && config.aCodec) {
      const aSource = new AudioBufferSource({ codec: config.aCodec, bitrate: QUALITY_HIGH });
      output.addAudioTrack(aSource);
      aPromise = aSource.add(audioBuffer);
    }

    await output.start();
    let time = 0;
    const step = 1 / fps;

    const drawText = (txt, size, y, alpha = 1, centerX = ui.canvas.width * 0.75) => {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "white";
      ctx.font = `${size}px "Hiragino Mincho ProN", serif`;
      const w = ctx.measureText(txt).width;
      ctx.fillText(txt, centerX - w/2, y);
      ctx.restore();
    };

    // 1. Intro
    for(let i=0; i<fps*secTitle; i++) {
      ctx.fillStyle = "black"; ctx.fillRect(0,0,1920,1080);
      drawText(ui.tStart.value, 80, 540, 1, 960);
      await vSource.add(time, step); time += step;
    }

    // 2. Main Contents
    for(const p of photoList) {
      const frames = fps * secPhoto;
      for(let i=0; i<frames; i++) {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,1920,1080);
        
        // Photo Fade
        let alpha = 1;
        if(i < fps) alpha = i/fps;
        if(i > frames - fps) alpha = (frames - i)/fps;
        
        ctx.save();
        ctx.globalAlpha = alpha;
        const scale = Math.min(960 / p.img.width, 1080 / p.img.height);
        const nw = p.img.width * scale;
        const nh = p.img.height * scale;
        ctx.drawImage(p.img, (960-nw)/2, (1080-nh)/2, nw, nh);
        ctx.restore();

        // Scroll Text
        const prog = i / frames;
        const ty = 1180 + (-1400 * prog);
        drawText(p.period, 45, ty, alpha);
        drawText(p.caption, 55, ty + 80, alpha);

        await vSource.add(time, step); time += step;
      }
    }

    // 3. Outro
    for(let i=0; i<fps*secTitle; i++) {
      ctx.fillStyle = "black"; ctx.fillRect(0,0,1920,1080);
      drawText(ui.tEnd.value, 80, 480, 1, 960);
      drawText("©︎ Loyal corp. All rights reserved.", 35, 600, 1, 960);
      if(logo.complete) {
        const lw = 500;
        const lh = (logo.height/logo.width)*lw;
        ctx.drawImage(logo, 960 - lw/2, 700, lw, lh);
      }
      await vSource.add(time, step); time += step;
    }

    await aPromise;
    await output.finalize();

    const blob = new Blob([output.target.buffer], { type: await output.getMimeType() });
    const url = URL.createObjectURL(blob);
    ui.video.src = url;
    ui.dlArea.innerHTML = `<a href="${url}" download="memorial_movie.mp4" class="download-link">動画を保存</a>`;

  } catch (e) {
    console.error(e);
    alert("エラーが発生しました。");
  } finally {
    ui.btnGen.disabled = false;
    ui.btnGen.textContent = "動画を作成";
  }
};
</script>
</body>
</html>
